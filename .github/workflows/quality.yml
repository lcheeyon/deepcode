name: Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Traceability docs regeneration + validation
        run: |
          python3 scripts/generate_ac_details_and_squad_docs.py
          python3 scripts/generate_bdd_stubs_from_traceability.py
          python3 scripts/validate_user_stories_traceability.py
          git diff --exit-code docs/user-stories/traceability-ac-detail-matrix.csv docs/user-stories/traceability-ac-detail.json docs/user-stories/phase-exports docs/user-stories/squads docs/user-stories/bdd-stubs
      - name: Lint, types, tests (ci-quality)
        run: make ci-quality

  web-console-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web deps
        run: npm ci
        working-directory: apps/web
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: apps/web
      - name: Next build
        run: npm run build
        working-directory: apps/web
      - name: Playwright tests
        run: CI=1 npm run test:e2e
        working-directory: apps/web
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-console
          path: apps/web/playwright-report/
          retention-days: 14

  web-console-e2e-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start MinIO
        run: docker compose -f docker/compose.dev.yml up -d minio
      - name: Wait for MinIO
        run: bash scripts/wait_minio_health.sh
      - name: Bucket and CORS (minio-init)
        run: docker compose -f docker/compose.dev.yml run --rm minio-init
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install workspace
        run: pip install -e ".[dev]"
      - name: Start API (memory store + MinIO presign)
        run: |
          export DEEPGUARD_S3_BUCKET=deepguard-dev
          export DEEPGUARD_S3_ENDPOINT_URL=http://127.0.0.1:9000
          export DEEPGUARD_S3_ACCESS_KEY_ID=deepguard
          export DEEPGUARD_S3_SECRET_ACCESS_KEY=deepguarddev
          export DEEPGUARD_S3_REGION=us-east-1
          export DEEPGUARD_CORS_ORIGINS=http://127.0.0.1:3000
          uvicorn deepguard_api.main:app --host 127.0.0.1 --port 8000 &
          echo $! > /tmp/uvicorn-api.pid
          bash scripts/wait_http.sh http://127.0.0.1:8000/v1/healthz 90
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web deps
        run: npm ci
        working-directory: apps/web
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: apps/web
      - name: Next build
        run: npm run build
        working-directory: apps/web
      - name: Playwright — real repo-upload against MinIO
        run: |
          cd apps/web
          E2E_REAL_API=1 E2E_API_BASE_URL=http://127.0.0.1:8000 E2E_API_KEY=dev CI=1 npm run test:e2e -- e2e/repo-upload-minio.spec.ts
      - name: Upload Playwright HTML report (MinIO)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-minio
          path: apps/web/playwright-report/
          retention-days: 14
      - name: Stop API and MinIO
        if: always()
        run: |
          if [ -f /tmp/uvicorn-api.pid ]; then kill "$(cat /tmp/uvicorn-api.pid)" 2>/dev/null || true; fi
          docker compose -f docker/compose.dev.yml down -v

  dependency-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: deptry + pip-audit
        run: make audit
